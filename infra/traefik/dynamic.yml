# =============================================================================
# Traefik dynamic configuration — security headers + rate limiting middlewares.
# The HTTP→HTTPS redirect is NOT here — it's set per-router via entrypoint
# in traefik.prod.yml after Let's Encrypt certs are obtained.
# =============================================================================

http:
  middlewares:
    security-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 63072000
        customFrameOptionsValue: "SAMEORIGIN"

    rate-limit-api:
      rateLimit:
        average: 100
        burst: 50
        period: 1m

    rate-limit-general:
      rateLimit:
        average: 300
        burst: 100
        period: 1m
