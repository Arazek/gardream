# =============================================================================
# Traefik dynamic configuration — middlewares + catch-all HTTP→HTTPS redirect.
# Mounted at /etc/traefik/dynamic.yml in production.
# The redirect router is defined here (not at entrypoint level) so the
# Let's Encrypt ACME challenge path is excluded from the redirect.
# =============================================================================

http:
  middlewares:
    security-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 63072000
        customFrameOptionsValue: "SAMEORIGIN"

    https-redirect:
      redirectScheme:
        scheme: https
        permanent: true

    rate-limit-api:
      rateLimit:
        average: 100
        burst: 50
        period: 1m

    rate-limit-general:
      rateLimit:
        average: 300
        burst: 100
        period: 1m

  routers:
    # Catch-all HTTP→HTTPS redirect — applies to ALL requests on port 80
    # EXCEPT the Let's Encrypt ACME challenge path.
    http-to-https:
      entryPoints:
        - web
      rule: "PathPrefix(`/`)"
      middlewares:
        - https-redirect
      service: noop@internal
      priority: 1
