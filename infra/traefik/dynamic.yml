# =============================================================================
# Traefik dynamic configuration — middlewares + catch-all HTTP→HTTPS redirect.
# The redirect uses a router with priority 1 so Traefik's built-in ACME
# challenge routers (higher priority) bypass it for /.well-known/acme-challenge/*.
# =============================================================================

http:
  middlewares:
    security-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 63072000
        customFrameOptionsValue: "SAMEORIGIN"

    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true

    rate-limit-api:
      rateLimit:
        average: 100
        burst: 50
        period: 1m

    rate-limit-general:
      rateLimit:
        average: 300
        burst: 100
        period: 1m

  routers:
    http-catchall:
      rule: "PathPrefix(`/`)"
      entryPoints:
        - web
      middlewares:
        - redirect-to-https
      service: noop
      priority: 1

  services:
    noop:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:9"
