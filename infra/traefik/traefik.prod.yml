# =============================================================================
# Traefik production configuration — Let's Encrypt via HTTP-01 challenge.
# ACME_EMAIL_PLACEHOLDER is replaced by scripts/production-setup.sh at runtime
# because Traefik static config does NOT support env var substitution.
# Mounted over traefik.yml by infra/docker-compose.prod.yml.
# =============================================================================

api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
      middlewares:
        - security-headers@file

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: proxy-network
  file:
    filename: /etc/traefik/dynamic.yml

certificatesResolvers:
  letsencrypt:
    acme:
      email: ACME_EMAIL_PLACEHOLDER
      storage: /etc/traefik/certs/acme.json
      httpChallenge:
        entryPoint: web

log:
  level: INFO
