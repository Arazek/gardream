# =============================================================================
# Traefik production configuration — Let's Encrypt TLS + HTTP→HTTPS redirect.
# ACME email is passed via the traefik container environment (ACME_EMAIL).
# Mounted over traefik.yml by infra/docker-compose.prod.yml.
# =============================================================================

api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
      middlewares:
        - security-headers@file

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: proxy-network
  file:
    filename: /etc/traefik/dynamic.yml

certificatesResolvers:
  letsencrypt:
    acme:
      email: ${ACME_EMAIL}
      storage: /etc/traefik/certs/acme.json
      tlsChallenge: {}

log:
  level: INFO
