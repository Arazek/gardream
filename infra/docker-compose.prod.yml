# =============================================================================
# Production overrides for infra/docker-compose.yml.
# Mounts traefik.prod.yml (Let's Encrypt + HTTP→HTTPS redirect) and
# dynamic.yml (security headers + rate limiting).
# ACME_EMAIL is passed to Traefik via Docker Compose variable substitution
# from .env.prod (generated by scripts/production-setup.sh).
# =============================================================================

services:

  traefik:
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./traefik/traefik.prod.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro

  keycloak:
    command: start --import-realm
    environment:
      KC_HOSTNAME: https://${GATEWAY_HOSTNAME}/keycloak
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - ./keycloak/realm-config.prod.json:/opt/keycloak/data/import/realm-config.json:ro
