# =============================================================================
# Local dev overrides for docker-compose.yml — backend + frontend + storybook.
# Assumes the infra stack (traefik, postgres, keycloak) is already running
# via infra/docker-compose.yml and has created the proxy-network network.
# =============================================================================

services:

  backend:
    build:
      target: development
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    labels:
      - "traefik.enable=true"
      # HTTP routing
      - "traefik.http.routers.backend-http.rule=Host(`${DOMAIN:-localhost}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend-http.entrypoints=web"
      - "traefik.http.routers.backend-http.service=backend"
      # HTTPS routing
      - "traefik.http.routers.backend.rule=Host(`${DOMAIN:-localhost}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"

  frontend:
    build:
      target: development
    environment:
      NODE_OPTIONS: "--max-http-header-size=65536"
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    labels:
      - "traefik.enable=true"
      # HTTP routing
      - "traefik.http.routers.frontend-http.rule=Host(`${DOMAIN:-localhost}`) && PathPrefix(`/`)"
      - "traefik.http.routers.frontend-http.entrypoints=web"
      - "traefik.http.routers.frontend-http.service=frontend"
      # HTTPS routing
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=4200"

  storybook:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    command: ["npm", "run", "storybook"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "6006:6006"
    networks:
      - proxy
    profiles:
      - storybook
