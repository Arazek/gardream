# =============================================================================
# Local dev override — backend + frontend only
# Assumes the infra stack (traefik, postgres, keycloak) is already running
# via infra/docker-compose.yml and has created the proxy-network network.
# =============================================================================

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    env_file:
      - .env
    volumes:
      - ./backend:/app
    networks:
      - proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`${DOMAIN:-localhost}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=4200"

  storybook:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    command: ["npm", "run", "storybook"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "6006:6006"
    networks:
      - proxy-network
    profiles:
      - storybook

networks:
  proxy-network:
    external: true
