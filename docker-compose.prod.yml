# =============================================================================
# Production overrides for docker-compose.yml.
# Assumes the infra stack (traefik, postgres, keycloak) is already running.
# =============================================================================

services:

  backend:
    env_file:
      - .env.prod
    labels:
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    env_file:
      - .env.prod
    labels:
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /usr/share/nginx/html/index.html"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
