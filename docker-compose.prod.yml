# =============================================================================
# Production overrides for docker-compose.yml.
# Assumes the infra stack (traefik, postgres, keycloak) is already running.
# =============================================================================

services:

  backend:
    env_file:
      - .env.prod
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    env_file:
      - .env.prod
    deploy:
      resources:
        limits:
          memory: 256M
